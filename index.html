<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Générateur porte clé</title>
</head>

<body>

<h2>Générateur de porte clé personnalisé</h2>

Nom :
<input id="nom" value="Raymond">

<button onclick="download()">Télécharger STL</button>

<script>

function download(){

let nom = document.getElementById("nom").value;

let contenu = "Porte clé généré pour : " + nom;

let fichier = new Blob([contenu], {type:"text/plain"});

let lien = document.createElement("a");

lien.href = URL.createObjectURL(fichier);

lien.download = nom + "_porte_cle.stl";

lien.click();

}

</script>

</body>
</html>
